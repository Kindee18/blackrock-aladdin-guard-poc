name: Aladdin Guard PoC - AI-Augmented Reliability

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  verify-logic:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3

    - name: Run Agent Logic Verification
      run: |
        echo "[START] Starting AI Reliability Audit..."
        python3 -m unittest tests/test_agent.py

  validate-infrastructure:
    runs-on: ubuntu-latest
    needs: verify-logic

    steps:
    - uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init & Validate
      run: |
        cd terraform
        terraform init -backend=false
        terraform validate
        echo "[SUCCESS] Infrastructure validation passed."
